name = "vn-market-daily-worker"
main = "src/index.ts"
compatibility_date = "2026-04-28"
account_id = "4c15704ef706b9c8954cd6f9feb678d8"

[observability.logs]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "vn_market_news"
database_id = "85a1925f-0f6c-40ab-9a98-3dd015e41ae2"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "CACHE"
id = "8190fc51469149a28a65a14930c19c18"
preview_id = "5ba8f2b4749947acb805eb7dbdb463d3"

[[r2_buckets]]
binding = "ASSETS"
bucket_name = "vn-market-assets"
preview_bucket_name = "vn-market-assets-preview"

[vars]
# Default OpenAI model when task-specific OPENAI_MODEL_* vars are unset (summarize, explain fallback, translate).
OPENAI_MODEL = "gpt-5.5"
# Optional: route OpenAI chat through AI Gateway — set gateway slug + same Cloudflare account_id as above, then `wrangler secret put CF_AIG_TOKEN` (AI Gateway token with Run permission).
# AI_GATEWAY_ID = "your-gateway-name"
# AI_GATEWAY_ACCOUNT_ID = "4c15704ef706b9c8954cd6f9feb678d8"
# AI_GATEWAY_SKIP_CACHE = "false"
# Per-task Workers AI models (see src/services/ai-config.ts)
# WORKERS_AI_MODEL_SUMMARY = "@cf/meta/llama-3.1-8b-instruct-fast"
# WORKERS_AI_MODEL_EXPLAIN = "@cf/meta/llama-3.3-70b-instruct-fp8-fast"
# WORKERS_AI_MODEL_IMAGE = "@cf/bytedance/stable-diffusion-xl-lightning"
# Per-task OpenAI models (optional overrides of OPENAI_MODEL)
# OPENAI_MODEL_SUMMARY = "gpt-4o-mini"
# OPENAI_MODEL_EXPLAIN = "gpt-5.5"
# OPENAI_MODEL_TRANSLATE = "gpt-4o-mini"
# Optional: try OpenAI before Workers AI for explain only (needs OPENAI_API_KEY + optional Gateway vars).
# AI_EXPLAIN_OPENAI_FIRST = "true"
TZ = "Asia/Ho_Chi_Minh"
# Optional: Telegram bot @handle without @ (for /notify deep links). Secrets: TELEGRAM_BOT_TOKEN, TELEGRAM_WEBHOOK_SECRET.
TELEGRAM_BOT_USERNAME = "stocknewsbyocbot"
# Optional: when set, optimized images are uploaded to Cloudflare Images Hosted and served via imagedelivery.net.
# Add CF_IMAGES_ACCOUNT_HASH in Cloudflare Worker vars/secrets to enable Hosted Images delivery URLs.
CF_IMAGES_ACCOUNT_HASH = "N9GPD68IDHgBkqGwpbP3sNnv5LYKTKrH"
CF_IMAGES_VARIANT = "public"
# Optional: comma-separated seed URLs for AI Search crawl container.
WEBSITE_CRAWL_SEEDS = "https://stocknews.orangecloud.vn/,https://stocknews.orangecloud.vn/briefing,https://stocknews.orangecloud.vn/calendar"
# Optional RFC 9728: comma-separated HTTPS OAuth/OIDC issuer URLs (RFC 8414). When unset, metadata uses this worker’s origin.
# OAUTH_AUTHORIZATION_SERVERS = "https://YOURTEAM.cloudflareaccess.com"
# Optional: override advertised OAuth scopes (space or comma separated).
# OAUTH_SCOPES_SUPPORTED = "openid news.read admin"

[triggers]
crons = ["*/5 * * * *"]

[ai]
binding = "AI"

# Cloudflare Images transform API (resize/encode in the Images pipeline)
[images]
binding = "IMAGES"
